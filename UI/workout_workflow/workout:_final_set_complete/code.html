<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Workout: Final Set Complete</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20d0d",
                        "background-light": "#f8f5f5",
                        "background-dark": "#1a0b0b", // Adjusted slightly darker for high contrast
                        "surface-dark": "#2a1515", // Slightly lighter for cards
                        "surface-darker": "#231010", // Even darker for contrast areas
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "1.5rem", 
                        "xl": "2rem", 
                        "2xl": "2.5rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Confetti Animation */
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f20d0d;
            opacity: 0.3;
        }
        .confetti:nth-child(2n) { background-color: #ffffff; }
        .confetti:nth-child(3n) { background-color: #cb9090; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen antialiased selection:bg-primary selection:text-white overflow-x-hidden relative">
<!-- Subtle Confetti Layer -->
<div aria-hidden="true" class="absolute inset-0 overflow-hidden pointer-events-none z-0 opacity-40">
<div class="confetti top-0 left-[10%] animate-[fall_4s_linear_infinite]" style="animation-delay: 0s;"></div>
<div class="confetti top-0 left-[20%] animate-[fall_3.5s_linear_infinite]" style="animation-delay: 1s;"></div>
<div class="confetti top-0 left-[30%] animate-[fall_4.2s_linear_infinite]" style="animation-delay: 2s;"></div>
<div class="confetti top-0 left-[50%] animate-[fall_3.8s_linear_infinite]" style="animation-delay: 0.5s;"></div>
<div class="confetti top-0 left-[60%] animate-[fall_4.5s_linear_infinite]" style="animation-delay: 1.5s;"></div>
<div class="confetti top-0 left-[80%] animate-[fall_3.2s_linear_infinite]" style="animation-delay: 0.2s;"></div>
<div class="confetti top-0 left-[90%] animate-[fall_4.1s_linear_infinite]" style="animation-delay: 2.2s;"></div>
</div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col min-h-screen max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark pb-32">
<!-- Top Bar -->
<header class="flex items-center justify-between p-6 pb-2">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-darker/50 text-white/60">
<span class="material-symbols-outlined text-xl">arrow_back_ios_new</span>
</div>
<h2 class="text-sm font-bold uppercase tracking-widest text-white/50">Current Workout</h2>
<div class="flex items-center gap-1 bg-primary/10 px-3 py-1.5 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm font-variation-FILL">timer</span>
<span class="text-primary font-bold text-sm tabular-nums tracking-wide">45:12</span>
</div>
</header>
<!-- Progress Header -->
<section class="px-6 py-4 flex flex-col gap-2">
<div class="flex justify-between items-end mb-1">
<h1 class="text-3xl font-black italic tracking-tighter uppercase text-white leading-none">
                    Finish<br/>Strong
                </h1>
<span class="text-primary font-bold text-lg mb-1">98%</span>
</div>
<div class="h-1.5 w-full bg-surface-dark rounded-full overflow-hidden">
<div class="h-full bg-primary w-[98%] rounded-full shadow-[0_0_12px_rgba(242,13,13,0.6)]"></div>
</div>
</section>
<!-- Live Stats Row -->
<section class="px-6 grid grid-cols-3 gap-3 mb-6">
<div class="flex flex-col items-center justify-center p-3 rounded-2xl bg-surface-darker border border-white/5">
<span class="material-symbols-outlined text-primary mb-1 text-2xl">ecg_heart</span>
<span class="text-white font-black text-xl leading-none">162</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white/40 mt-1">BPM</span>
</div>
<div class="flex flex-col items-center justify-center p-3 rounded-2xl bg-surface-darker border border-white/5">
<span class="material-symbols-outlined text-orange-500 mb-1 text-2xl">local_fire_department</span>
<span class="text-white font-black text-xl leading-none">320</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white/40 mt-1">KCAL</span>
</div>
<div class="flex flex-col items-center justify-center p-3 rounded-2xl bg-surface-darker border border-white/5">
<span class="material-symbols-outlined text-blue-500 mb-1 text-2xl">bolt</span>
<span class="text-white font-black text-xl leading-none">Zone 4</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white/40 mt-1">Anaerobic</span>
</div>
</section>
<!-- Hero Exercise Card -->
<section class="px-6 mb-6">
<div class="relative w-full rounded-2xl overflow-hidden bg-surface-darker shadow-lg border border-white/5 group">
<!-- Image/Video Placeholder -->
<div class="aspect-video w-full bg-cover bg-center relative" data-alt="Athlete performing tricep dips on parallel bars in a dark gym setting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAUFg-g0AGhRfqEupLR5D1n3ozsBWdYoSI12HR9nizgBgmcxsQc73z_Nu6BSWHkqbtkbWow8xcWt0zvrrL1ysKjHB0BhZUEe-Bk4624L6j6-EDwyNcHB8_XyUZ9us-H64i58pE0Oql7w69nqf6oaLbjK3uRqLIte3qdFd5V83JP852D1YjeNPl4xYTE8PJXY_kx9QiwqCPT5vdQoplTCCjRcrVfE_Z5JKApNM324bxzAW6-Hbg8nutNGRt8KaFDAjeWqHKALmRXlpKm');">
<div class="absolute inset-0 bg-gradient-to-t from-surface-darker via-transparent to-transparent opacity-90"></div>
</div>
<div class="absolute bottom-0 left-0 w-full p-5">
<div class="flex justify-between items-end">
<div>
<span class="inline-block px-2 py-0.5 rounded text-[10px] font-bold bg-white/10 text-white/80 uppercase tracking-wider mb-2 backdrop-blur-sm">Arms • Isolation</span>
<h2 class="text-2xl font-black uppercase italic tracking-tighter text-white leading-none mb-1">Tricep Dips</h2>
<p class="text-white/60 text-sm font-medium">3 sets • 12 reps</p>
</div>
<button class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white hover:bg-primary hover:text-white transition-colors">
<span class="material-symbols-outlined">info</span>
</button>
</div>
</div>
</div>
</section>
<!-- Set Tracker -->
<section class="px-6 flex flex-col gap-3">
<h3 class="text-xs font-bold uppercase tracking-widest text-white/40 ml-1 mb-1">Set History</h3>
<!-- Set 1 (Completed) -->
<label class="group flex items-center justify-between p-4 rounded-xl bg-surface-darker border border-primary/20 opacity-50 transition-all">
<div class="flex items-center gap-4">
<div class="flex flex-col items-center justify-center w-8">
<span class="text-xs font-bold text-white/40">SET</span>
<span class="text-xl font-black text-white/60">1</span>
</div>
<div class="h-8 w-[1px] bg-white/10"></div>
<div>
<p class="text-white font-bold text-lg">12 Reps</p>
<p class="text-primary/80 text-xs font-medium uppercase tracking-wide">45 lbs</p>
</div>
</div>
<div class="relative flex items-center justify-center">
<input checked="" class="peer h-6 w-6 cursor-default appearance-none rounded-full border-2 border-primary bg-primary text-white checked:bg-primary focus:ring-0 focus:ring-offset-0" disabled="" type="checkbox"/>
<span class="material-symbols-outlined absolute pointer-events-none text-white text-sm font-bold">check</span>
</div>
</label>
<!-- Set 2 (Completed) -->
<label class="group flex items-center justify-between p-4 rounded-xl bg-surface-darker border border-primary/20 opacity-50 transition-all">
<div class="flex items-center gap-4">
<div class="flex flex-col items-center justify-center w-8">
<span class="text-xs font-bold text-white/40">SET</span>
<span class="text-xl font-black text-white/60">2</span>
</div>
<div class="h-8 w-[1px] bg-white/10"></div>
<div>
<p class="text-white font-bold text-lg">12 Reps</p>
<p class="text-primary/80 text-xs font-medium uppercase tracking-wide">45 lbs</p>
</div>
</div>
<div class="relative flex items-center justify-center">
<input checked="" class="peer h-6 w-6 cursor-default appearance-none rounded-full border-2 border-primary bg-primary text-white checked:bg-primary focus:ring-0 focus:ring-offset-0" disabled="" type="checkbox"/>
<span class="material-symbols-outlined absolute pointer-events-none text-white text-sm font-bold">check</span>
</div>
</label>
<!-- Set 3 (Active/Just Completed) -->
<label class="group flex items-center justify-between p-5 rounded-2xl bg-surface-dark border-2 border-primary shadow-[0_0_20px_rgba(242,13,13,0.15)] relative overflow-hidden">
<!-- Active Indicator Strip -->
<div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary"></div>
<div class="flex items-center gap-4 pl-2">
<div class="flex flex-col items-center justify-center w-8">
<span class="text-xs font-bold text-primary">SET</span>
<span class="text-2xl font-black text-white">3</span>
</div>
<div class="h-10 w-[1px] bg-white/10"></div>
<div>
<p class="text-white font-bold text-xl">12 Reps</p>
<p class="text-primary text-sm font-bold uppercase tracking-wide">45 lbs</p>
</div>
</div>
<!-- Custom Checkbox Interaction -->
<div class="relative flex items-center justify-center">
<input checked="" class="peer h-8 w-8 cursor-pointer appearance-none rounded-full border-2 border-primary bg-primary text-white transition-all hover:scale-110 checked:bg-primary checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2 focus:ring-offset-surface-dark" type="checkbox"/>
<span class="material-symbols-outlined absolute pointer-events-none text-white text-lg font-bold animate-[ping_0.5s_ease-out]">check</span>
<span class="material-symbols-outlined absolute pointer-events-none text-white text-lg font-bold">check</span>
</div>
</label>
</section>
</div>
<!-- Sticky Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 z-50 p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent pt-12 max-w-md mx-auto">
<button class="w-full relative group overflow-hidden rounded-full bg-primary p-4 shadow-[0_0_30px_rgba(242,13,13,0.4)] transition-transform active:scale-[0.98]">
<!-- Button sheen effect -->
<div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
<div class="flex items-center justify-center gap-3">
<span class="text-white text-lg font-black uppercase italic tracking-wider">Finish Workout</span>
<span class="material-symbols-outlined text-white font-bold">flag</span>
</div>
</button>
</div>
<style>
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</body></html>
