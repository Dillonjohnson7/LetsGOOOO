<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding: Experience Level</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#80f20d",
                        "primary-dark": "#66c20a",
                        "background-light": "#f7f8f5",
                        "background-dark": "#121212", // Adjusted for darker "Nike-like" feel
                        "surface-dark": "#1e1e1e",
                        "surface-highlight": "#2d2d2d"
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "2xl": "2.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "neon": "0 0 20px -5px rgba(128, 242, 13, 0.3)",
                        "neon-hover": "0 0 30px -5px rgba(128, 242, 13, 0.5)"
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary selection:text-black">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md px-6 py-4 flex items-center justify-between">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<div class="text-sm font-medium opacity-60 uppercase tracking-widest">Step 3 of 5</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Progress Indicator -->
<div class="px-6 pb-2">
<div class="flex gap-2 w-full h-1.5">
<div class="h-full flex-1 rounded-full bg-primary/40 dark:bg-primary/30"></div>
<div class="h-full flex-1 rounded-full bg-primary/40 dark:bg-primary/30"></div>
<div class="h-full flex-1 rounded-full bg-primary shadow-[0_0_10px_rgba(128,242,13,0.8)]"></div>
<div class="h-full flex-1 rounded-full bg-slate-200 dark:bg-surface-highlight"></div>
<div class="h-full flex-1 rounded-full bg-slate-200 dark:bg-surface-highlight"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 px-6 pt-6 pb-32 flex flex-col">
<!-- Text Header -->
<div class="mb-8">
<h1 class="text-4xl md:text-5xl font-extrabold italic tracking-tight leading-[0.95] mb-4 uppercase">
                Define Your<br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-white">Baseline.</span>
</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg font-light leading-relaxed max-w-sm">
                We need this to calibrate your initial weights and intensity.
            </p>
</div>
<!-- Selection Cards -->
<div class="flex flex-col gap-4">
<!-- Card 1: Beginner -->
<label class="group relative flex items-center gap-5 p-5 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent hover:border-slate-200 dark:hover:border-surface-highlight transition-all duration-300 cursor-pointer overflow-hidden">
<input class="peer sr-only" name="experience" type="radio" value="beginner"/>
<!-- Background Image Overlay -->
<div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&amp;w=2940&amp;auto=format&amp;fit=crop')] bg-cover bg-center grayscale mix-blend-overlay" data-alt="Abstract gym equipment texture"></div>
<div class="relative z-10 flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-slate-100 dark:bg-surface-highlight text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">spa</span>
</div>
<div class="relative z-10 flex flex-col">
<span class="text-xl font-bold tracking-tight mb-1">Beginner</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-light leading-tight">New to lifting. 0-6 months experience. Focus on form.</span>
</div>
</label>
<!-- Card 2: Intermediate (Selected State) -->
<label class="relative flex items-center gap-5 p-5 rounded-2xl bg-surface-dark dark:bg-[#1a1a1a] border-2 border-primary shadow-neon transition-all duration-300 cursor-pointer transform scale-[1.02] overflow-hidden">
<input checked="" class="peer sr-only" name="experience" type="radio" value="intermediate"/>
<!-- Background Image Overlay -->
<div class="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&amp;w=2940&amp;auto=format&amp;fit=crop')] bg-cover bg-center grayscale mix-blend-overlay" data-alt="Dumbbell rack in gym"></div>
<!-- Active Indicator -->
<div class="absolute top-4 right-4 h-3 w-3 rounded-full bg-primary shadow-[0_0_8px_#80f20d]"></div>
<div class="relative z-10 flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-primary text-black font-bold">
<span class="material-symbols-outlined text-[28px]">fitness_center</span>
</div>
<div class="relative z-10 flex flex-col pr-6">
<span class="text-xl font-bold tracking-tight mb-1 text-white">Intermediate</span>
<span class="text-sm text-slate-300 font-light leading-tight">Consistent training. 6 months - 2 years. Ready for overload.</span>
</div>
</label>
<!-- Card 3: Advanced -->
<label class="group relative flex items-center gap-5 p-5 rounded-2xl bg-white dark:bg-surface-dark border-2 border-transparent hover:border-slate-200 dark:hover:border-surface-highlight transition-all duration-300 cursor-pointer overflow-hidden">
<input class="peer sr-only" name="experience" type="radio" value="advanced"/>
<!-- Background Image Overlay -->
<div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?q=80&amp;w=2938&amp;auto=format&amp;fit=crop')] bg-cover bg-center grayscale mix-blend-overlay" data-alt="Heavy lifting chains texture"></div>
<div class="relative z-10 flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-slate-100 dark:bg-surface-highlight text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">bolt</span>
</div>
<div class="relative z-10 flex flex-col">
<span class="text-xl font-bold tracking-tight mb-1">Advanced</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-light leading-tight">High performance. 2+ years serious lifting. Push limits.</span>
</div>
</label>
</div>
</main>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent z-40 pb-8">
<button class="group w-full bg-primary hover:bg-primary-dark text-black h-16 rounded-full font-bold text-lg uppercase tracking-wide flex items-center justify-center gap-2 transition-all shadow-[0_0_20px_rgba(128,242,13,0.3)] hover:shadow-[0_0_30px_rgba(128,242,13,0.5)] active:scale-95">
            Next Step
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</body></html>
